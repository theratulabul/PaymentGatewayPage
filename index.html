<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagad | Secure Payment Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nagad-orange: #f7941d;
            --nagad-red: #ed1c24;
            --bg-gradient: linear-gradient(135deg, #fff5f2 0%, #ffffff 100%);
            --text-main: #333;
            --text-muted: #666;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .payment-container {
            background: #fff;
            width: 100%;
            max-width: 430px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Section */
        .header {
            background: #ffffff; /* লোগোর সাথে মিল রেখে সাদা ব্যাকগ্রাউন্ড */
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid var(--nagad-red);
        }

        .nagad-logo {
            width: 150px;
            height: auto;
            margin-bottom: 10px;
        }

        .secure-badge {
            background: #fff0f0;
            color: var(--nagad-red);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            display: inline-block;
            border: 1px solid #ffcccc;
        }

        /* Instruction Box */
        .instruction-box {
            background: #fff9f4;
            border: 1.5px dashed var(--nagad-orange);
            margin: 20px 25px;
            padding: 18px;
            border-radius: 16px;
        }

        #timer {
            text-align: center;
            color: var(--nagad-red);
            font-size: 13px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .instruction-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .instruction-row span:first-child { color: var(--text-muted); }
        .copyable-num { 
            font-weight: 700; 
            color: var(--nagad-red); 
            cursor: pointer; 
            border-bottom: 1px dotted var(--nagad-red);
        }

        /* Form Body */
        .form-body { padding: 0 25px 25px; }
        .input-group { margin-bottom: 15px; }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }
        .input-group input:focus { border-color: var(--nagad-orange); }

        /* Button */
        .verify-btn {
            width: 100%;
            background: linear-gradient(to right, var(--nagad-orange), var(--nagad-red));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 5px;
        }
        .verify-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(237, 28, 36, 0.2); }

        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Status & Footer */
        .status-box { display: none; margin-top: 20px; padding: 18px; border-radius: 12px; text-align: center; }
        .success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        .footer {
            text-align: center;
            padding: 20px;
            background: #fdfdfd;
            border-top: 1px solid #f1f1f1;
        }
        .verified-text {
            font-size: 11px;
            font-weight: 600;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
        }
        .copyright { font-size: 10px; color: #999; }
    </style>
</head>
<body>

    <div class="payment-container">
        <div class="header">
            <img src="https://encrypted-tbn2.gstatic.com/images?q=tbn:ANd9GcTdGMnhYK6EaSZgE2e0M6zumQWzKv81hwVHZkNM_EE7XDotyVf8" alt="Nagad Official" class="nagad-logo">
            <br>
            <div class="secure-badge">🛡️ Secure Payment Gateway</div>
        </div>

        <div class="instruction-box">
            <div id="timer">⏱️ Session expires in: 10:00</div>
            <div class="instruction-row">
                <span>Send Money to:</span>
                <span class="copyable-num" id="phoneNum" onclick="copyNumber()">01810249698</span>
            </div>
            <div class="instruction-row">
                <span>Account Type:</span>
                <span style="font-weight: 600;">Personal</span>
            </div>
        </div>

        <div class="form-body">
            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="custName" placeholder="Full name">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="custEmail" placeholder="your@email.com">
            </div>
            <div class="input-group">
                <label>Amount (BDT)</label>
                <input type="number" id="payAmount" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Nagad Transaction ID</label>
                <input type="text" id="trxID" placeholder="e.g. 7G8X9L2W">
            </div>

            <button class="verify-btn" onclick="processPayment()" id="submitBtn">
                <div class="spinner" id="loader"></div>
                <span id="btnText">Verify Payment</span>
            </button>

            <div id="statusBox" class="status-box">
                <strong id="statusTitle"></strong>
                <p id="statusText" style="margin-top: 5px; font-size: 13px;"></p>
                <div id="receipt" style="display: none; border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 10px; text-align: left; font-size: 12px;"></div>
            </div>
        </div>

        <div class="footer">
            <div class="verified-text">
                <span style="color: #2e7d32;">✔</span> Verified by Nagad Payment Gateway v2.0
            </div>
            <div class="copyright">
                © 2026 Secured By <strong>SSLWireless</strong>
            </div>
        </div>
    </div>

    <script>
        // Timer Logic
        let timeLeft = 600; 
        function startCountdown() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').innerHTML = `⏱️ Session expires in: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (timeLeft <= 0) { location.reload(); } else { timeLeft--; setTimeout(startCountdown, 1000); }
        }
        startCountdown();

        // Copy Number
        function copyNumber() {
            const num = document.getElementById('phoneNum');
            navigator.clipboard.writeText(num.innerText);
            const original = num.innerText;
            num.innerText = "COPIED!";
            num.style.color = "#2e7d32";
            setTimeout(() => { num.innerText = original; num.style.color = "#ed1c24"; }, 1500);
        }

        // Payment Processing
        function processPayment() {
            const name = document.getElementById('custName').value;
            const email = document.getElementById('custEmail').value;
            const amount = document.getElementById('payAmount').value;
            const trx = document.getElementById('trxID').value;
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const statusBox = document.getElementById('statusBox');

            if (!name || !email || !amount || !trx) {
                showMsg('error', 'Incomplete Form', 'Please fill all fields.');
                return;
            }

            btn.disabled = true;
            loader.style.display = "block";
            document.getElementById('btnText').innerText = "Verifying...";

            setTimeout(() => {
                btn.disabled = false;
                loader.style.display = "none";
                document.getElementById('btnText').innerText = "Verify Payment";

                if (trx.length >= 8) {
                    showMsg('success', '✅ Payment Successful', 'Transaction has been verified.');
                    const receipt = document.getElementById('receipt');
                    receipt.style.display = "block";
                    receipt.innerHTML = `<strong>RECEIPT</strong><br>TrxID: ${trx.toUpperCase()}<br>Amount: ৳ ${amount}<br>Status: Verified by SSLWireless`;
                } else {
                    showMsg('error', '❌ Invalid TrxID', 'The Transaction ID is too short.');
                }
            }, 2000);
        }

        function showMsg(type, title, text) {
            const box = document.getElementById('statusBox');
            box.style.display = "block"; box.className = "status-box " + type;
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusText').innerText = text;
        }
    </script>
</body>
</html>
